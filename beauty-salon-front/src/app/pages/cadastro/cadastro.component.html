<div class="cadastro-wrapper">
  <header class="main-header">
    <a routerLink="/" class="back-link">← Voltar para o Início</a>
    <h1>Beauty Salon</h1>
    <p class="subtitle">Bem-vinda! Crie seu cadastro para agendar seus horários.</p>
    <div class="header-divider"></div>
  </header>

  <main class="content-container">
    <section class="register-card">
      <form [formGroup]="cadastroForm" (ngSubmit)="salvarCliente()">
        <input type="hidden" formControlName="id">

        <h3 class="form-section-title" style="margin-top: 0;">Dados Pessoais</h3>

        <div class="form-group">
          <label for="nome">Nome Completo</label>
          <input type="text" id="nome" formControlName="nome" placeholder="Ex: Maria Silva">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" formControlName="cpf" placeholder="000.000.000-00">
          </div>
          <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" formControlName="telefone" placeholder="(00) 00000-0000">
          </div>
        </div>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" formControlName="email" placeholder="maria@email.com">
        </div>

        <!-- Grupo aninhado para o endereço -->
        <div formGroupName="endereco">
          <h3 class="form-section-title">Endereço</h3>

          <div class="form-row pr-grid-cep">
            <div class="form-group">
              <label for="cep">CEP</label>
              <input type="text" id="cep" formControlName="cep" placeholder="Apenas números">
            </div>
            <div class="form-group">
              <label for="logradouro">Logradouro</label>
              <input type="text" id="logradouro" formControlName="logradouro" placeholder="Rua, Avenida...">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="numero">Número</label>
              <input type="text" id="numero" formControlName="numero" placeholder="123">
            </div>
            <div class="form-group">
              <label for="complemento">Complemento</label>
              <input type="text" id="complemento" formControlName="complemento" placeholder="Apto, Bloco...">
            </div>
          </div>

          <div class="form-row pr-grid-uf">
            <div class="form-group">
              <label for="bairro">Bairro</label>
              <input type="text" id="bairro" formControlName="bairro" placeholder="Centro">
            </div>
            <div class="form-group">
              <label for="cidade">Cidade</label>
              <input type="text" id="cidade" formControlName="cidade" placeholder="Sua cidade">
            </div>
            <div class="form-group">
              <label for="uf">UF</label>
              <input type="text" id="uf" formControlName="uf" maxlength="2" placeholder="PR">
            </div>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="btnSalvar">Concluir Cadastro</button>

        <a routerLink="/agendamentos" class="link-agendamento">Já possui cadastro? Agende seu horário aqui →</a>
      </form>
    </section>
  </main>
</div>

<div class="agendamento-wrapper">
  <header class="main-header">
    <a routerLink="/" class="back-link">← Voltar ao Início</a>
    <h1>Seu Momento</h1>
    <p class="subtitle">Escolha o serviço e o horário ideal para você.</p>
    <div class="header-divider"></div>
  </header>

  <main class="content-container">
    <section class="booking-card">
      <form [formGroup]="agendamentoForm" (ngSubmit)="confirmarAgendamento()">

        <div class="form-group">
          <label for="cpf">Seu CPF</label>
          <input type="text" id="cpf" formControlName="cpf" placeholder="Ex: 123.456.789-00">
        </div>

        <div class="form-group">
          <label for="data">Data e Horário</label>
          <input type="datetime-local" id="data" formControlName="data" [min]="dataMinima">
        </div>

        <div class="form-group">
          <label for="servicos">Quais serviços deseja realizar?</label>
          <input type="text" id="servicos" formControlName="servicos" placeholder="Ex: Corte, Coloração, Escova...">
        </div>

        <button type="submit" class="btn-submit">Confirmar Agendamento</button>

      </form>
    </section>
  </main>
</div>
